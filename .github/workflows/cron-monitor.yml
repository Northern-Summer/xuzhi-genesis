name: Cron Monitor

# Run every hour
on:
  schedule:
    - cron: '0 * * * *'   # every hour at minute 0
  # Allow manual trigger for debugging
  workflow_dispatch:
    inputs:
      force_alert:
        description: 'Force send Discord alert even if healthy'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'

jobs:
  cron-health-check:
    name: Cron Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout workspace to get the monitor script
          path: workspace-checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── Run local cron watchdog ──────────────────────────────────────
      - name: Run local cron watchdog
        id: watchdog
        run: |
          cd centers/engineering/harness || true
          python3 ~/xuzhi_genesis/scripts/cron_watchdog.py || true
        continue-on-error: true
        working-directory: /home/runner/work/xuzhi_genesis/xuzhi_genesis

      # ── Parse watchdog output for error summary ─────────────────────
      - name: Parse watchdog result
        id: parse
        run: |
          echo "watchdog_exit=${{ steps.watchdog.outcome }}" >> $GITHUB_OUTPUT
          echo "all_healthy=$(python3 -c "
import json, sys
try:
    with open('/home/runner/work/xuzhi_genesis/xuzhi_genesis/.openclaw/cron/jobs.json') as f:
        jobs = json.load(f)
    results = [(j.get('id','?'), j.get('state',{}).get('consecutiveErrors',0), j.get('state',{}).get('lastRunStatus','unknown')) for j in jobs.get('jobs',[]) if j.get('enabled',True)]
    has_errors = any(e > 0 or s == 'error' for _, e, s in results)
    print('false' if has_errors else 'true')
except Exception as ex:
    print('unknown')
")" >> $GITHUB_OUTPUT

      # ── Discord alert: any error state ───────────────────────────────
      - name: Discord Alert (errors detected)
        if: env.DISCORD_WEBHOOK != '' && (steps.parse.outputs.all_healthy == 'false' || github.event.inputs.force_alert == 'true')
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 <<'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK", "")
          if not WEBHOOK:
              print("No webhook, skip.")
              sys.exit(0)

          try:
              with open("/home/runner/work/xuzhi_genesis/xuzhi_genesis/.openclaw/cron/jobs.json") as f:
                  jobs = json.load(f)
          except Exception as e:
              print(f"Could not read jobs file: {e}")
              sys.exit(1)

          from datetime import datetime, timezone
          all_jobs = jobs.get("jobs", [])
          enabled = [j for j in all_jobs if j.get("enabled", True)]

          error_jobs = []
          for j in enabled:
              state = j.get("state", {})
              errors = state.get("consecutiveErrors", 0)
              status = state.get("lastRunStatus", "unknown")
              if errors > 0 or status == "error":
                  error_jobs.append({
                      "name": j.get("name", j.get("id", "?")),
                      "id": j.get("id", "?"),
                      "errors": errors,
                      "status": status,
                      "last_run": state.get("lastRunAt", "unknown"),
                  })

          fields = "\n".join(
              f"• **{r['name']}** (`{r['id']}`) — `{r['errors']}` consecutive errors | last: `{r['status']}`"
              for r in error_jobs
          ) or "_(none)_"

          payload = {
              "content": None,
              "embeds": [{
                  "title": f"🚨 Cron Monitor — {len(error_jobs)} Job(s) with Errors",
                  "description": (
                      f"**Checked**: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}\n"
                      f"**Repo**: `${{ os.environ.get('GITHUB_REPOSITORY', '?') }}`\n"
                      f"**Watchdog exit**: `${{ os.environ.get('WATCHDOG_EXIT', '?') }}`\n\n"
                      f"**Error jobs**:\n{fields}"
                  ),
                  "color": 15158332,
                  "footer": {"text": "xuzhi_genesis cron-monitor"},
              }]
          }

          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              WEBHOOK, data=data,
              headers={"Content-Type": "application/json"},
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  print(f"Discord alert sent (status {resp.status})")
          except urllib.error.HTTPError as e:
              print(f"HTTP error {e.code}: {e.read()}")
          except Exception as ex:
              print(f"Discord error: {ex}")
          PYEOF
        shell: python3

      # ── Discord: all healthy ─────────────────────────────────────────
      - name: Discord OK (no errors)
        if: env.DISCORD_WEBHOOK != '' && steps.parse.outputs.all_healthy == 'true' && github.event.inputs.force_alert != 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 <<'PYEOF'
          import json, urllib.request, urllib.error, os, sys
          from datetime import datetime, timezone

          WEBHOOK = os.environ.get("DISCORD_WEBHOOK", "")
          if not WEBHOOK:
              sys.exit(0)

          try:
              with open("/home/runner/work/xuzhi_genesis/xuzhi_genesis/.openclaw/cron/jobs.json") as f:
                  jobs = json.load(f)
              total = len([j for j in jobs.get("jobs",[]) if j.get("enabled",True)])
          except:
              total = "?"

          payload = {
              "content": None,
              "embeds": [{
                  "title": "✅ Cron Monitor — All Healthy",
                  "description": (
                      f"**Checked**: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}\n"
                      f"**Total enabled jobs**: {total}\n"
                      f"**Errors**: 0"
                  ),
                  "color": 3066993,
                  "footer": {"text": "xuzhi_genesis cron-monitor"},
              }]
          }
          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              WEBHOOK, data=data,
              headers={"Content-Type": "application/json"},
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  print(f"Discord OK sent (status {resp.status})")
          except Exception as ex:
              print(f"Discord error: {ex}")
          PYEOF
        shell: python3

      # ── Debug: list job states ───────────────────────────────────────
      - name: Debug: dump job states
        if: github.event.inputs.force_alert == 'true'
        run: |
          python3 -c "
          import json
          try:
              with open('/home/runner/work/xuzhi_genesis/xuzhi_genesis/.openclaw/cron/jobs.json') as f:
                  jobs = json.load(f)
              for j in jobs.get('jobs',[]):
                  if j.get('enabled'):
                      s = j.get('state',{})
                      print(f\"{j.get('name','?')} | errors={s.get('consecutiveErrors',0)} | status={s.get('lastRunStatus','?')} | last_run={s.get('lastRunAt','?')}\")
          except Exception as e:
              print(f'Error: {e}')
          "

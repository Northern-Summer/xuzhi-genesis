name: CI

on:
  push:
    branches: [main, master, '**']
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ── 1. Syntax & Quality ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install flake8 pyflakes

      - name: Run flake8
        run: |
          flake8 centers/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 centers/ scripts/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run pyflakes
        run: pyflakes centers/ scripts/

  # ── 2. Pytest with Coverage ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run pytest with coverage
        run: |
          cd centers/engineering/harness
          python3 -m pytest tests/ -q --tb=short --cov=. --cov-report=term-missing --cov-report=xml
        working-directory: /home/runner/work/xuzhi_genesis/xuzhi_genesis

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── 3. Full harness integration test ────────────────────────────────
  harness-integration:
    name: Harness Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install harness deps
        run: pip install pytest

      - name: Full integration run
        run: cd centers/engineering/harness && python3 -m pytest tests/ -v --tb=long
        working-directory: /home/runner/work/xuzhi_genesis/xuzhi_genesis

  # ── 4. Notify ───────────────────────────────────────────────────────
  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [lint, test, harness-integration]
    if: always()
    steps:
      - name: Discord Webhook
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK}" ]]; then
            echo "DISCORD_WEBHOOK not set, skipping notification."
            exit 0
          fi

          FAILED=false
          for job in lint test harness-integration; do
            STATUS=$(gh api repos/${{ github.repository }}/actions/runs --jq '.workflow_runs[0].conclusion' 2>/dev/null || echo "unknown")
          done

          # Check overall result
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.harness-integration.result }}" == "failure" ]]; then
            FAILED=true
          fi

          if [[ "${FAILED}" == "true" ]]; then
            PAYLOAD=$(cat <<'EOF'
            {
              "content": null,
              "embeds": [{
                "title": "❌ CI Failed — xuzhi_genesis",
                "description": "**Commit**: `${{ github.sha }}`\n**Branch**: `${{ github.ref_name }}`\n**Author**: `${{ github.actor }}`\n[View Runs](${{ github.server_url }}/${{ github.repository }}/actions)",
                "color": 15158332
              }]
            }
EOF
            )
            curl -s -H "Content-Type: application/json" -d "${PAYLOAD}" "${DISCORD_WEBHOOK}"
          else
            PAYLOAD=$(cat <<'EOF'
            {
              "content": null,
              "embeds": [{
                "title": "✅ CI Passed — xuzhi_genesis",
                "description": "**Commit**: `${{ github.sha }}`\n**Branch**: `${{ github.ref_name }}`\n**Author**: `${{ github.actor }}`\n[View Runs](${{ github.server_url }}/${{ github.repository }}/actions)",
                "color": 3066993
              }]
            }
EOF
            )
            curl -s -H "Content-Type: application/json" -d "${PAYLOAD}" "${DISCORD_WEBHOOK}"
          fi
        shell: bash

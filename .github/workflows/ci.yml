name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-seconds: 300
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python syntax check
        run: find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" | xargs -I{} python3 -m py_compile {} 2>&1

      - name: Shell syntax check
        run: find . -name "*.sh" -not -path "./.git/*" | xargs -I{} bash -n {} 2>&1

      - name: Pyflakes (unused imports)
        run: pip install pyflakes 2>/dev/null && find . -name "*.py" -not -path "./.git/*" | xargs pyflakes 2>&1 || true

  test:
    runs-on: ubuntu-latest
    timeout-seconds: 600
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Harness Tests
        run: |
          cd centers/engineering/harness
          pip install pytest pytest-asyncio 2>/dev/null
          python3 -m pytest tests/ -q --tb=short 2>&1
        timeout-minutes: 10

  notify:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Discord notification
        if: vars.DISCORD_WEBHOOK != ''
        run: |
          STATUS="${{ needs.lint.result == 'success' && needs.test.result == 'success' && '✅ SUCCESS' || '❌ FAILURE' }}"
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"[xuzhi_genesis] CI $STATUS\nCommit: $GITHUB_SHA\nRepo: $GITHUB_REPOSITORY\"}" \
            "${{ vars.DISCORD_WEBHOOK }}" 2>/dev/null || true
        shell: bash
